<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Agro - Boshqaruv tizimi</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           GLOBAL STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #818cf8;
            --secondary: #0ea5e9;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --gray: #64748b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            color: var(--dark);
        }
        
        /* ============================================
           SCROLLBAR
           ============================================ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        
        /* ============================================
           LOGIN PAGE
           ============================================ */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            position: relative;
            overflow: hidden;
        }
        
        .login-wrapper::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%);
            top: -400px;
            right: -200px;
            border-radius: 50%;
        }
        
        .login-wrapper::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, transparent 70%);
            bottom: -300px;
            left: -200px;
            border-radius: 50%;
        }
        
        .login-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .login-box .logo {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 4px;
        }
        
        .login-box .logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-box .logo-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .login-box .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 400;
        }
        
        .login-box .form-group {
            margin-bottom: 18px;
        }
        
        .login-box .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--dark);
            font-size: 13px;
        }
        
        .login-box .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            background: #f8fafc;
        }
        
        .login-box .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: var(--white);
        }
        
        .login-box .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }
        
        .login-box .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.4);
        }
        
        .login-box .btn-login:active {
            transform: translateY(0);
        }
        
        .login-box .error-msg {
            color: var(--danger);
            text-align: center;
            margin-top: 15px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* ============================================
           APP LAYOUT
           ============================================ */
        .app {
            display: flex;
            min-height: 100vh;
        }
        
        .hidden { display: none !important; }
        
        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            width: 270px;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
            transition: var(--transition);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        
        .sidebar .brand {
            padding: 24px 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }
        
        .sidebar .brand .logo-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar .brand .logo-text i {
            font-size: 28px;
            color: var(--warning);
        }
        
        .sidebar .brand h1 {
            color: var(--white);
            font-size: 22px;
            font-weight: 700;
        }
        
        .sidebar .brand h1 span {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sidebar .brand small {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            display: block;
            margin-top: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .sidebar .menu-item {
            padding: 12px 24px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
            border-left: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
            margin: 2px 10px;
            border-radius: var(--radius-sm);
        }
        
        .sidebar .menu-item:hover {
            background: rgba(255,255,255,0.06);
            color: var(--white);
        }
        
        .sidebar .menu-item.active {
            background: rgba(79, 70, 229, 0.2);
            color: var(--white);
            border-left-color: var(--primary-light);
        }
        
        .sidebar .menu-item i {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        
        .sidebar .menu-item .badge {
            margin-left: auto;
            background: var(--danger);
            color: var(--white);
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .sidebar .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 10px 20px;
        }
        
        /* 🔥 BIZ BILAN BOG'LANISH - SIDEBAR */
        .sidebar .contact-info {
            padding: 15px 20px;
            margin: 10px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .sidebar .contact-info .contact-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f59e0b;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .sidebar .contact-info .contact-title i {
            font-size: 16px;
        }
        
        .sidebar .contact-info .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            padding: 5px 0;
            transition: var(--transition);
        }
        
        .sidebar .contact-info .contact-item:hover {
            color: rgba(255,255,255,0.95);
        }
        
        .sidebar .contact-info .contact-item i {
            width: 20px;
            font-size: 14px;
            color: #f59e0b;
        }
        
        .sidebar .contact-info .contact-item a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .sidebar .contact-info .contact-item a:hover {
            color: #f59e0b;
        }
        
        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main-content {
            margin-left: 270px;
            flex: 1;
            padding: 24px 30px;
            min-height: 100vh;
            background: #f1f5f9;
        }
        
        /* ============================================
           TOP BAR
           ============================================ */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            background: var(--white);
            padding: 16px 28px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .topbar .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .topbar .page-title span {
            color: var(--gray);
            font-weight: 400;
            font-size: 14px;
        }
        
        .topbar .user-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .topbar .user-section .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .topbar .user-section .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
        }
        
        .topbar .user-section .name {
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }
        
        .topbar .user-section .role {
            font-size: 12px;
            color: var(--gray);
        }
        
        .topbar .user-section .logout-btn {
            padding: 8px 20px;
            background: var(--danger);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        
        .topbar .user-section .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.03);
        }
        
        /* ============================================
           PAGE CONTENT
           ============================================ */
        #pageContent {
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ============================================
           LOADING
           ============================================ */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading p {
            font-size: 15px;
        }
        
        /* ============================================
           DASHBOARD CARDS
           ============================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: var(--white);
            padding: 22px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 18px;
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .stat-card.blue::after { background: var(--primary); }
        .stat-card.green::after { background: var(--success); }
        .stat-card.orange::after { background: var(--warning); }
        .stat-card.purple::after { background: #8b5cf6; }
        .stat-card.red::after { background: var(--danger); }
        .stat-card.teal::after { background: #14b8a6; }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        .stat-card .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--white);
            flex-shrink: 0;
        }
        
        .stat-card.blue .stat-icon { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .stat-card.green .stat-icon { background: linear-gradient(135deg, var(--success), #16a34a); }
        .stat-card.orange .stat-icon { background: linear-gradient(135deg, var(--warning), #d97706); }
        .stat-card.purple .stat-icon { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .stat-card.red .stat-icon { background: linear-gradient(135deg, var(--danger), #dc2626); }
        .stat-card.teal .stat-icon { background: linear-gradient(135deg, #14b8a6, #0d9488); }
        
        .stat-card .stat-info {
            flex: 1;
            min-width: 0;
        }
        
        .stat-card .stat-info .stat-label {
            font-size: 13px;
            color: var(--gray);
            font-weight: 500;
        }
        
        .stat-card .stat-info .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* ============================================
           DASHBOARD ROW
           ============================================ */
        .dashboard-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .dashboard-card {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            transition: var(--transition);
        }
        
        .dashboard-card:hover {
            box-shadow: var(--shadow-lg);
        }
        
        .dashboard-card .card-header {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .dashboard-card .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* ============================================
           PRODUCT LIST
           ============================================ */
        .product-list .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            transition: var(--transition);
        }
        
        .product-list .product-item:last-child {
            border-bottom: none;
        }
        
        .product-list .product-item:hover {
            background: #f8fafc;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 6px;
        }
        
        .product-list .product-name {
            font-weight: 500;
            font-size: 14px;
        }
        
        .product-list .product-count {
            font-weight: 600;
            font-size: 14px;
            padding: 2px 12px;
            border-radius: 20px;
            background: #f1f5f9;
        }
        
        .product-list .product-count.high { background: #dcfce7; color: #16a34a; }
        .product-list .product-count.medium { background: #fef3c7; color: #d97706; }
        .product-list .product-count.low { background: #fee2e2; color: #dc2626; }
        
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--gray);
            font-size: 14px;
        }
        
        .empty-state i {
            font-size: 36px;
            color: #e2e8f0;
            display: block;
            margin-bottom: 10px;
        }
        
        /* ============================================
           PRINTER PANEL
           ============================================ */
        .printer-panel {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            margin-bottom: 16px;
        }
        
        .printer-panel .printer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .printer-panel .printer-header i {
            font-size: 20px;
            color: var(--primary);
        }
        
        .printer-panel .printer-header span {
            font-weight: 600;
            font-size: 15px;
        }
        
        .printer-panel .printer-header .printer-status {
            margin-left: auto;
            font-size: 13px;
            font-weight: 500;
            color: #22c55e;
        }
        
        .printer-panel .printer-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .printer-panel .printer-select {
            padding: 8px 14px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            background: var(--white);
            min-width: 120px;
        }
        
        .printer-panel .printer-select:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .printer-panel .printer-preview {
            display: none;
            margin-top: 14px;
            padding: 16px;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            border: 1px solid #e2e8f0;
            position: relative;
        }
        
        .printer-panel .printer-preview .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .printer-panel .printer-preview .preview-header span {
            font-weight: 600;
            font-size: 14px;
        }
        
        .printer-panel .printer-preview .btn-close-preview {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--gray);
        }
        
        .printer-panel .printer-preview .btn-close-preview:hover {
            color: var(--danger);
        }
        
        .printer-panel .printer-preview .preview-content {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .printer-panel .printer-preview .preview-content pre {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 8px;
            background: var(--white);
            border-radius: 6px;
            margin: 0;
        }
        
        .receipt-preview {
            background: var(--white);
            padding: 16px;
            border-radius: 8px;
            max-width: 320px;
            margin: 0 auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .receipt-preview .receipt-shop {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .receipt-preview .receipt-divider {
            text-align: center;
            color: #94a3b8;
            letter-spacing: 1px;
        }
        
        .receipt-preview .receipt-items {
            padding: 8px 0;
            min-height: 60px;
        }
        
        .receipt-preview .receipt-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            font-size: 13px;
        }
        
        .receipt-preview .receipt-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 16px;
            padding: 8px 0;
        }
        
        .receipt-preview .receipt-footer {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #e2e8f0;
        }
        
        .empty-preview {
            text-align: center;
            color: #94a3b8;
            padding: 20px 0;
        }
        
        .barcode-input {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            border: 2px dashed #e2e8f0;
        }
        
        .barcode-input i {
            font-size: 20px;
            color: var(--gray);
        }
        
        .barcode-input input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }
        
        .barcode-input input:focus {
            outline: none;
        }
        
        .barcode-input input::placeholder {
            color: #94a3b8;
        }
        
        /* ============================================
           QAYTARISH MODAL STILLARI
           ============================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 450px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        
        .modal-content .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .modal-content .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
        }
        
        .modal-content .modal-header h3 i {
            color: var(--danger);
            margin-right: 10px;
        }
        
        .modal-content .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray);
            transition: var(--transition);
        }
        
        .modal-content .modal-close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }
        
        .modal-content .form-group {
            margin-bottom: 16px;
        }
        
        .modal-content .form-group label {
            display: block;
            font-weight: 500;
            font-size: 13px;
            color: var(--dark);
            margin-bottom: 4px;
        }
        
        .modal-content .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }
        
        .modal-content .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        
        .modal-content .product-info-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #e2e8f0;
        }
        
        .modal-content .product-info-box h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--dark);
        }
        
        .modal-content .product-info-box p {
            font-size: 13px;
            padding: 4px 0;
            color: var(--gray);
        }
        
        .modal-content .product-info-box p strong {
            color: var(--dark);
        }
        
        .modal-content .btn-block {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            justify-content: center;
        }
        
        .modal-content .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .modal-content .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        
        .modal-content .alert-danger {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .return-section {
            margin-top: 10px;
            border-top: 2px solid #f1f5f9;
            padding-top: 12px;
        }
        
        .return-section .btn-danger {
            background: var(--danger);
            color: white;
            width: 100%;
            justify-content: center;
        }
        
        .return-section .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 1024px) {
            .sidebar { width: 72px; }
            .sidebar .brand h1 { font-size: 16px; }
            .sidebar .brand small { display: none; }
            .sidebar .menu-item span { display: none; }
            .sidebar .menu-item .badge { display: none; }
            .main-content { margin-left: 72px; }
            .sidebar .brand { padding: 16px; text-align: center; }
            .sidebar .brand .logo-text { justify-content: center; }
            .sidebar .menu-item { padding: 12px 18px; justify-content: center; }
            .sidebar .contact-info .contact-item span { display: none; }
            .sidebar .contact-info .contact-title span { display: none; }
            .sidebar .contact-info .contact-item a { display: none; }
        }
        
        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .topbar { flex-direction: column; gap: 12px; align-items: stretch; }
            .topbar .user-section { justify-content: space-between; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .dashboard-row { grid-template-columns: 1fr; }
            .printer-panel .printer-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .printer-panel .printer-select {
                width: 100%;
            }
            .receipt-preview {
                max-width: 100%;
            }
            .modal-content {
                padding: 20px;
                margin: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .login-box { width: 100%; margin: 16px; padding: 30px 24px; }
            .topbar .page-title { font-size: 18px; }
            .modal-content {
                padding: 15px;
            }
        }
        
        /* ============================================
           TOAST
           ============================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            color: var(--white);
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.4s ease;
            box-shadow: var(--shadow-lg);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        .toast.info { background: var(--primary); }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* ============================================
           POS (KASSA) STILLARI
           ============================================ */
        .pos-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .pos-shift {
            background: var(--white);
            padding: 16px 24px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .pos-shift .shift-status {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pos-shift .shift-status .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .pos-shift .shift-status .status-dot.open { background: var(--success); }
        .pos-shift .shift-status .status-dot.closed { background: var(--danger); }
        
        .pos-shift .shift-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .pos-shift .shift-controls input {
            padding: 8px 14px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 14px;
            width: 140px;
        }
        
        .pos-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .pos-products {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .pos-search input {
            width: 100%;
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
        }
        
        .pos-search input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        
        .pos-product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            max-height: 450px;
            overflow-y: auto;
            margin-top: 14px;
        }
        
        .pos-product {
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
        }
        
        .pos-product:hover {
            border-color: var(--primary);
            transform: scale(1.04);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.15);
        }
        
        .pos-product .product-image {
            width: 60px;
            height: 60px;
            margin: 0 auto 8px;
            border-radius: 10px;
            overflow: hidden;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pos-product .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .pos-product .product-image i {
            font-size: 28px;
            color: #94a3b8;
        }
        
        .pos-product .product-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .pos-product .product-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--success);
        }
        
        .pos-product .product-qty {
            font-size: 10px;
            color: var(--gray);
        }
        
        /* ============================================
           POS CART
           ============================================ */
        .pos-cart {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            max-height: 600px;
        }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 12px;
        }
        
        .cart-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .cart-header .cart-count {
            background: var(--primary);
            color: var(--white);
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .cart-item .item-name {
            font-weight: 500;
            flex: 1;
            font-size: 14px;
        }
        
        .cart-item .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .cart-item .item-controls button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .cart-item .item-controls button:hover {
            background: var(--primary);
            color: var(--white);
        }
        
        .cart-item .item-total {
            font-weight: 600;
            min-width: 80px;
            text-align: right;
            font-size: 14px;
        }
        
        .cart-item .item-remove {
            color: var(--danger);
            cursor: pointer;
            font-weight: 700;
            padding: 0 6px;
            font-size: 18px;
            transition: var(--transition);
        }
        
        .cart-item .item-remove:hover {
            transform: scale(1.2);
        }
        
        .empty-cart {
            text-align: center;
            color: var(--gray);
            padding: 30px 0;
        }
        
        .empty-cart i {
            font-size: 40px;
            color: #e2e8f0;
            display: block;
            margin-bottom: 10px;
        }
        
        .cart-total {
            border-top: 2px solid #f1f5f9;
            padding-top: 14px;
            margin-top: 10px;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 14px;
        }
        
        .total-row input {
            width: 80px;
            padding: 4px 8px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            text-align: right;
            font-size: 14px;
        }
        
        .grand-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
            padding-top: 10px;
            border-top: 2px solid var(--primary);
            margin-top: 6px;
        }
        
        .payment-section {
            margin-top: 14px;
            border-top: 2px solid #f1f5f9;
            padding-top: 14px;
        }
        
        .payment-type {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn-payment {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            background: var(--white);
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }
        
        .btn-payment:hover {
            border-color: var(--primary);
        }
        
        .btn-payment.active {
            border-color: var(--primary);
            background: #eef2ff;
            color: var(--primary);
        }
        
        .btn-pay {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-pay:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
        }
        
        #creditForm {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        
        #creditForm input {
            padding: 8px 14px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 14px;
        }
        
        /* ============================================
           BUTTONS
           ============================================ */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }
        
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3); }
        
        .btn-success { background: var(--success); color: var(--white); }
        .btn-success:hover { background: #16a34a; box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3); }
        
        .btn-danger { background: var(--danger); color: var(--white); }
        .btn-danger:hover { background: #dc2626; box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3); }
        
        .btn-warning { background: var(--warning); color: var(--white); }
        .btn-warning:hover { background: #d97706; box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3); }
        
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-lg { padding: 14px 32px; font-size: 16px; }
        
        /* ============================================
           PRODUCTS (OMBOR)
           ============================================ */
        .products-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .section-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        
        .product-form {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .product-form h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .form-grid .full-width {
            grid-column: 1 / -1;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .form-group label {
            font-weight: 500;
            font-size: 13px;
            color: var(--dark);
        }
        
        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        
        .form-group input[readonly] {
            background: #f1f5f9;
            cursor: not-allowed;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .products-table {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            overflow-x: auto;
        }
        
        .products-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .products-table table thead {
            background: #f1f5f9;
        }
        
        .products-table table th {
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: var(--dark);
        }
        
        .products-table table td {
            padding: 12px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        
        .products-table table tbody tr:hover {
            background: #f8fafc;
        }
        
        .products-table table .product-img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: #f1f5f9;
        }
        
        /* ============================================
           REPORTS
           ============================================ */
        .reports-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .report-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .report-controls input {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 14px;
        }
        
        .report-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        
        .section-card {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .section-card h3 {
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .table-wrap {
            overflow-x: auto;
        }
        
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table-wrap table thead {
            background: #f1f5f9;
        }
        
        .table-wrap table th {
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }
        
        .table-wrap table td {
            padding: 10px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        
        .badge-status {
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-status.active { background: #dcfce7; color: #16a34a; }
        .badge-status.inactive { background: #fee2e2; color: #dc2626; }
        .badge-status.pending { background: #fef3c7; color: #d97706; }
        
        /* ============================================
           SETTINGS
           ============================================ */
        .settings-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .settings-form {
            max-width: 500px;
        }
        
        .settings-form .form-group {
            margin-bottom: 16px;
        }
        
        .settings-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        /* 🔥 CONTACT CARD - SOZLAMALAR BO'LIMI */
        .contact-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: var(--radius-sm);
            border: 1px solid #e2e8f0;
        }
        
        .contact-card .contact-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #e8ecf1;
        }
        
        .contact-card .contact-row:last-child {
            border-bottom: none;
        }
        
        .contact-card .contact-label {
            width: 120px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }
        
        .contact-card .contact-label i {
            width: 20px;
            color: var(--primary);
        }
        
        .contact-card .contact-value {
            flex: 1;
            color: var(--gray);
            font-size: 14px;
        }
        
        .contact-card .contact-value a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .contact-card .contact-value a:hover {
            color: var(--primary-dark);
