<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Agro - Boshqaruv tizimi</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           GLOBAL STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #818cf8;
            --secondary: #0ea5e9;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --gray: #64748b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            color: var(--dark);
            font-size: 18px;
            /* Sensor monoblok uchun kattaroq shrift */
        }
        
        /* ============================================
           SCROLLBAR
           ============================================ */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        
        /* ============================================
           LOGIN PAGE
           ============================================ */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            position: relative;
            overflow: hidden;
        }
        
        .login-wrapper::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%);
            top: -400px;
            right: -200px;
            border-radius: 50%;
        }
        
        .login-wrapper::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, transparent 70%);
            bottom: -300px;
            left: -200px;
            border-radius: 50%;
        }
        
        .login-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 440px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .login-box .logo {
            text-align: center;
            font-size: 40px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 4px;
        }
        
        .login-box .logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-box .logo-icon {
            text-align: center;
            font-size: 56px;
            margin-bottom: 10px;
        }
        
        .login-box .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 16px;
            font-weight: 400;
        }
        
        .login-box .form-group {
            margin-bottom: 20px;
        }
        
        .login-box .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 16px;
        }
        
        .login-box .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            background: #f8fafc;
        }
        
        .login-box .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: var(--white);
        }
        
        .login-box .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }
        
        .login-box .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.4);
        }
        
        .login-box .btn-login:active {
            transform: translateY(0);
        }
        
        .login-box .error-msg {
            color: var(--danger);
            text-align: center;
            margin-top: 15px;
            display: none;
            font-size: 16px;
            font-weight: 500;
        }
        
        /* ============================================
           APP LAYOUT
           ============================================ */
        .app {
            display: flex;
            min-height: 100vh;
        }
        
        .hidden { display: none !important; }
        
        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
            transition: var(--transition);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        
        .sidebar .brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 12px;
        }
        
        .sidebar .brand .logo-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar .brand .logo-text i {
            font-size: 28px;
            color: var(--warning);
        }
        
        .sidebar .brand h1 {
            color: var(--white);
            font-size: 22px;
            font-weight: 700;
        }
        
        .sidebar .brand h1 span {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sidebar .brand small {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            display: block;
            margin-top: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .sidebar .menu-item {
            padding: 14px 20px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
            border-left: 3px solid transparent;
            font-size: 16px;
            font-weight: 500;
            margin: 2px 10px;
            border-radius: var(--radius-sm);
        }
        
        .sidebar .menu-item:hover {
            background: rgba(255,255,255,0.06);
            color: var(--white);
        }
        
        .sidebar .menu-item.active {
            background: rgba(79, 70, 229, 0.2);
            color: var(--white);
            border-left-color: var(--primary-light);
        }
        
        .sidebar .menu-item i {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }
        
        .sidebar .menu-item .badge {
            margin-left: auto;
            background: var(--danger);
            color: var(--white);
            font-size: 12px;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .sidebar .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 10px 20px;
        }
        
        .sidebar .contact-info {
            padding: 15px 20px;
            margin: 10px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .sidebar .contact-info .contact-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f59e0b;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .sidebar .contact-info .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            padding: 6px 0;
            transition: var(--transition);
        }
        
        .sidebar .contact-info .contact-item i {
            width: 22px;
            font-size: 15px;
            color: #f59e0b;
        }
        
        .sidebar .contact-info .contact-item a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .sidebar .contact-info .contact-item a:hover {
            color: #f59e0b;
        }
        
        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 20px 25px;
            min-height: 100vh;
            background: #f1f5f9;
        }
        
        /* ============================================
           TOP BAR
           ============================================ */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--white);
            padding: 14px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .topbar .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .topbar .page-title span {
            color: var(--gray);
            font-weight: 400;
            font-size: 16px;
        }
        
        .topbar .user-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .topbar .user-section .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .topbar .user-section .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
        }
        
        .topbar .user-section .name {
            font-weight: 600;
            font-size: 16px;
            color: var(--dark);
        }
        
        .topbar .user-section .role {
            font-size: 14px;
            color: var(--gray);
        }
        
        .topbar .user-section .logout-btn {
            padding: 10px 22px;
            background: var(--danger);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        
        .topbar .user-section .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.03);
        }
        
        /* ============================================
           PAGE CONTENT
           ============================================ */
        #pageContent {
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .loading .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading p {
            font-size: 16px;
        }
        
        /* ============================================
           POS (KASSA) - CHAP TOMONDA
           ============================================ */
        .pos-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            height: calc(100vh - 120px);
        }
        
        /* Kassa paneli - chap tomonda (35%) */
        .pos-cart-panel {
            width: 35%;
            min-width: 320px;
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        
        .pos-cart-panel .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 12px;
        }
        
        .pos-cart-panel .cart-header h3 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .pos-cart-panel .cart-header .cart-count {
            background: var(--primary);
            color: var(--white);
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .pos-cart-panel .cart-items {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .pos-cart-panel .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 16px;
        }
        
        .pos-cart-panel .cart-item .item-name {
            font-weight: 500;
            flex: 1;
            font-size: 16px;
        }
        
        .pos-cart-panel .cart-item .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pos-cart-panel .cart-item .item-controls button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: var(--transition);
        }
        
        .pos-cart-panel .cart-item .item-controls button:hover {
            background: var(--primary);
            color: var(--white);
        }
        
        .pos-cart-panel .cart-item .item-total {
            font-weight: 600;
            min-width: 100px;
            text-align: right;
            font-size: 16px;
        }
        
        .pos-cart-panel .cart-item .item-remove {
            color: var(--danger);
            cursor: pointer;
            font-weight: 700;
            padding: 0 8px;
            font-size: 20px;
            transition: var(--transition);
        }
        
        .pos-cart-panel .empty-cart {
            text-align: center;
            color: var(--gray);
            padding: 40px 0;
            font-size: 16px;
        }
        
        .pos-cart-panel .empty-cart i {
            font-size: 48px;
            color: #e2e8f0;
            display: block;
            margin-bottom: 12px;
        }
        
        .pos-cart-panel .cart-total {
            border-top: 2px solid #f1f5f9;
            padding-top: 14px;
            margin-top: 10px;
        }
        
        .pos-cart-panel .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 16px;
        }
        
        .pos-cart-panel .total-row input {
            width: 100px;
            padding: 6px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            text-align: right;
            font-size: 16px;
        }
        
        .pos-cart-panel .grand-total {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            padding-top: 12px;
            border-top: 2px solid var(--primary);
            margin-top: 8px;
        }
        
        .pos-cart-panel .payment-section {
            margin-top: 14px;
            border-top: 2px solid #f1f5f9;
            padding-top: 14px;
        }
        
        .pos-cart-panel .payment-type {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .pos-cart-panel .btn-payment {
            padding: 10px 18px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            background: var(--white);
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
        }
        
        .pos-cart-panel .btn-payment:hover {
            border-color: var(--primary);
        }
        
        .pos-cart-panel .btn-payment.active {
            border-color: var(--primary);
            background: #eef2ff;
            color: var(--primary);
        }
        
        .pos-cart-panel .btn-pay {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }
        
        .pos-cart-panel .btn-pay:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
        }
        
        .pos-cart-panel #creditForm {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }
        
        .pos-cart-panel #creditForm input {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 16px;
        }
        
        /* Mahsulotlar - o'rtada (65%) */
        .pos-products-panel {
            flex: 1;
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        
        .pos-products-panel .pos-search input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 18px;
            transition: var(--transition);
        }
        
        .pos-products-panel .pos-search input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        
        .pos-products-panel .pos-product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            flex: 1;
            overflow-y: auto;
            margin-top: 14px;
            align-content: start;
        }
        
        .pos-products-panel .pos-product {
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
        }
        
        .pos-products-panel .pos-product:hover {
            border-color: var(--primary);
            transform: scale(1.04);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.15);
        }
        
        .pos-products-panel .pos-product .product-image {
            width: 72px;
            height: 72px;
            margin: 0 auto 10px;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pos-products-panel .pos-product .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .pos-products-panel .pos-product .product-image i {
            font-size: 34px;
            color: #94a3b8;
        }
        
        .pos-products-panel .pos-product .product-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .pos-products-panel .pos-product .product-price {
            font-size: 17px;
            font-weight: 700;
            color: var(--success);
        }
        
        .pos-products-panel .pos-product .product-qty {
            font-size: 13px;
            color: var(--gray);
        }
        
        /* ============================================
           SMENA PANELI
           ============================================ */
        .pos-shift {
            background: var(--white);
            padding: 14px 22px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04);
            margin-bottom: 16px;
        }
        
        .pos-shift .shift-status {
            font-weight: 600;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pos-shift .shift-status .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .pos-shift .shift-status .status-dot.open { background: var(--success); }
        .pos-shift .shift-status .status-dot.closed { background: var(--danger); }
        
        .pos-shift .shift-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .pos-shift .shift-controls input {
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 16px;
            width: 160px;
        }
        
        /* ============================================
           BUTTONS
           ============================================ */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        
        .btn-primary { background: var(--primary); color: var(--white); }

        .btn-sm { padding: 8px 18px; font-size: 14px; }
        
        /* ============================================
           TOAST
           ============================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 28px;
            border-radius: var(--radius-sm);
            color: var(--white);
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.4s ease;
            box-shadow: var(--shadow-lg);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 450px;
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        .toast.info { background: var(--primary); }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

           ============================================ */
        @media (max-width: 1024px) {
